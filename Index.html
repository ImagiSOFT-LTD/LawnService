<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sturgeon Lawn Services</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
text-align:center;
padding:40px;
background:#f7f7f7;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:40px 25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.company{
font-size:28px;
font-weight:bold;
color:#2e8b57;
margin-bottom:10px;
}

.tagline{
font-size:16px;
margin-bottom:35px;
color:#333;
}

.text-btn{
display:inline-block;
background:#2e8b57;
color:white;
text-decoration:none;
font-size:20px;
padding:16px 30px;
border-radius:8px;
font-weight:bold;
}

.text-btn:hover{
background:#256f47;
}

.terms{
margin-top:25px;
font-size:14px;
}

.terms a{
color:#2e8b57;
text-decoration:none;
}

</style>

<script>
function sendText(){
var phone = "5739877141";
var message = encodeURIComponent("Can I get a quote for your lawn services?");

var ua = navigator.userAgent || navigator.vendor || window.opera;

if(/android/i.test(ua)){
window.location.href = "sms:" + phone + "?body=" + message;
}
else{
window.location.href = "sms:" + phone + "&body=" + message;
}
}
</script>

</head>

<body>

<div class="container">

<div class="company">Sturgeon Lawn Services</div>

<div class="tagline">hassle free quote, no forms to fill out!</div>

<button class="text-btn" onclick="sendText()">Send Us A Text</button>

<div class="terms">
<a href="text-terms.html">Text Terms</a>
</div>

</div>

</body>
</html>
